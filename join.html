<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Hub</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --card2:#1f2937;
      --text:#f9fafb;
      --muted:#9ca3af;
      --accent:#7c3aed;
      --accent2:#a78bfa;
      --border:rgba(255,255,255,.08);
      --danger:#ef4444;
      --success:#22c55e;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#0b1120,#111827);
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px 0;
      font-size:28px;
    }

    .sub{
      margin:0 0 24px 0;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
    }

    .user-box{
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      margin-bottom:18px;
    }

    .label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .value{
      font-size:18px;
      font-weight:700;
    }

    .field{
      margin-bottom:16px;
    }

    select,
    input{
      width:100%;
      padding:14px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:var(--text);
      outline:none;
      font-size:15px;
    }

    select:focus,
    input:focus{
      border-color:var(--accent2);
      box-shadow:0 0 0 3px rgba(167,139,250,.15);
    }

    button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
    }

    button:hover{
      opacity:.95;
    }

    .status{
      margin-top:16px;
      padding:12px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      color:var(--muted);
      font-size:14px;
      min-height:46px;
    }

    .status.success{
      color:#dcfce7;
      border-color:rgba(34,197,94,.35);
      background:rgba(34,197,94,.10);
    }

    .status.error{
      color:#fee2e2;
      border-color:rgba(239,68,68,.35);
      background:rgba(239,68,68,.10);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Event Hub</h1>
    <p class="sub">Pick a live event, enter your ticket code, and go straight to that event page.</p>

    <div class="user-box">
      <span class="label">Signed in as</span>
      <div class="value" id="userName">Loading...</div>
    </div>

    <div class="field">
      <label class="label" for="eventSelect">Live event</label>
      <select id="eventSelect">
        <option value="">Loading events...</option>
      </select>
    </div>

    <div class="field">
      <label class="label" for="ticketCode">Ticket code</label>
      <input id="ticketCode" type="text" placeholder="Enter your code" maxlength="40" />
    </div>

    <button id="joinBtn" type="button">Join Event</button>

    <div class="status" id="statusBox">Waiting for event list...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const FIREBASE_CONFIG = {
      apiKey: "PASTE_YOUR_FIREBASE_API_KEY",
      authDomain: "PASTE_YOUR_AUTH_DOMAIN",
      projectId: "PASTE_YOUR_PROJECT_ID",
      storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
      messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
      appId: "PASTE_YOUR_APP_ID"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const userNameEl = document.getElementById("userName");
    const eventSelect = document.getElementById("eventSelect");
    const ticketCodeInput = document.getElementById("ticketCode");
    const joinBtn = document.getElementById("joinBtn");
    const statusBox = document.getElementById("statusBox");

    let liveEvents = [];

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = "status" + (type ? " " + type : "");
    }

    function getDisplayName() {
      let savedName = localStorage.getItem("event_display_name");

      if (!savedName) {
        savedName = "User-" + Math.random().toString(36).slice(2, 7).toUpperCase();
        localStorage.setItem("event_display_name", savedName);
      }

      return savedName;
    }

    async function ensureSignedIn() {
      if (auth.currentUser) return auth.currentUser;

      await signInAnonymously(auth);

      return new Promise((resolve) => {
        const unsub = onAuthStateChanged(auth, (user) => {
          if (user) {
            unsub();
            resolve(user);
          }
        });
      });
    }

    async function loadLiveEvents() {
      setStatus("Loading live events...");

      try {
        const eventsRef = collection(db, "events");

        // Assumes each event doc has:
        // name: string
        // live: boolean
        // pageUrl: string   (example: "verifications.html")
        // validCodes: array (example: ["ABC123", "VIP777"])
        const q = query(eventsRef, where("live", "==", true));
        const snap = await getDocs(q);

        liveEvents = [];
        eventSelect.innerHTML = "";

        if (snap.empty) {
          eventSelect.innerHTML = '<option value="">No live events</option>';
          setStatus("There are no live events right now.");
          return;
        }

        snap.forEach((docSnap) => {
          const data = docSnap.data();
          liveEvents.push({
            id: docSnap.id,
            name: data.name || "Untitled Event",
            pageUrl: data.pageUrl || "",
            validCodes: Array.isArray(data.validCodes) ? data.validCodes : []
          });
        });

        eventSelect.innerHTML = '<option value="">Select an event</option>';

        for (const event of liveEvents) {
          const option = document.createElement("option");
          option.value = event.id;
          option.textContent = event.name;
          eventSelect.appendChild(option);
        }

        setStatus("Live events loaded.", "success");
      } catch (error) {
        console.error(error);
        eventSelect.innerHTML = '<option value="">Could not load events</option>';
        setStatus("Failed to load live events.", "error");
      }
    }

    function findSelectedEvent() {
      return liveEvents.find((event) => event.id === eventSelect.value) || null;
    }

    function normalizeCode(code) {
      return String(code || "").trim().toUpperCase();
    }

    async function joinEvent() {
      const selectedEvent = findSelectedEvent();
      const enteredCode = normalizeCode(ticketCodeInput.value);

      if (!selectedEvent) {
        setStatus("Please select an event.", "error");
        return;
      }

      if (!enteredCode) {
        setStatus("Please enter your ticket code.", "error");
        return;
      }

      const validCodes = selectedEvent.validCodes.map(normalizeCode);
      const isValid = validCodes.includes(enteredCode);

      if (!isValid) {
        setStatus("That code is not valid for the selected event.", "error");
        return;
      }

      if (!selectedEvent.pageUrl) {
        setStatus("This event does not have a page set yet.", "error");
        return;
      }

      setStatus("Code accepted. Redirecting...", "success");

      // Optional: save last joined event/code locally
      localStorage.setItem("last_event_id", selectedEvent.id);
      localStorage.setItem("last_event_code", enteredCode);

      // Sends user to the event page with event ID and code in the URL
      window.location.href =
        `${selectedEvent.pageUrl}?event=${encodeURIComponent(selectedEvent.id)}&code=${encodeURIComponent(enteredCode)}`;
    }

    joinBtn.addEventListener("click", joinEvent);

    ticketCodeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        joinEvent();
      }
    });

    (async function init() {
      try {
        const displayName = getDisplayName();
        userNameEl.textContent = displayName;

        await ensureSignedIn();
        await loadLiveEvents();
      } catch (error) {
        console.error(error);
        setStatus("Could not start the page.", "error");
      }
    })();
  </script>
</body>
</html>
